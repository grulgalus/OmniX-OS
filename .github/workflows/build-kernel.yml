name: Build OmniX OS (MS-DOS Edition)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Stáhnutí repozitáře
        uses: actions/checkout@v4

      - name: Instalace nástrojů pro DOS (NASM a mtools)
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm mtools dosfstools

      - name: Kompilace vlastního OmniX programu
        run: |
          # Zkompiluje tvůj Assembly kód do spustitelného DOS programu
          nasm -f bin omnix.asm -o OMNIX.COM

      - name: Vytvoření obrazu disku (IMG) pro Limbo
        run: |
          # Vytvoří prázdný 100MB virtuální disk
          dd if=/dev/zero of=omnix_drive.img bs=1M count=100
          
          # Naformátuje disk na starý dobrý FAT16 (aby ho DOS přečetl)
          mkfs.fat -F 16 omnix_drive.img
          
          # Zkopíruje tvůj zkompilovaný program na disk
          mcopy -i omnix_drive.img OMNIX.COM ::/
          
          # Zkopíruje originální složku MS-DOS na disk
          mcopy -i omnix_drive.img -s MS-DOS ::/

      - name: Nahrání hotového disku ke stažení
        uses: actions/upload-artifact@v4
        with:
          name: OmniX-DOS-Drive
          path: omnix_drive.img
