name: Build OmniX OS (Boot Sector Edition)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Stáhnutí repozitáře
        uses: actions/checkout@v4

      - name: Instalace NASM
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Kompilace vlastního OmniX OS
        run: |
          nasm -f bin omnix-files/omnix.asm -o boot.bin

          dd if=/dev/zero of=omnix_os.img bs=1024 count=1440

          dd if=boot.bin of=omnix_os.img conv=notrunc

      - name: Nahrání hotového OS ke stažení
        uses: actions/upload-artifact@v4
        with:
          name: OmniX-Bootable-Floppy
          path: omnix_os.img
