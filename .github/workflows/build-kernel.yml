name: Build OmniX OS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repozitáře
        uses: actions/checkout@v4

      - name: Instalace NASM
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Instalace Rustu (Nightly)
        run: |
          rustup default nightly
          rustup target add i686-unknown-linux-gnu

      - name: Kompilace OmniX OS
        run: |
          nasm -f bin omnix-files/asm/boot.asm -o boot.bin
          rustc --target i686-unknown-linux-gnu -C panic=abort -C opt-level=2 -C relocation-model=static -C code-model=kernel --emit obj omnix-files/rust/kernel.rs -o kernel.o
          ld -m elf_i386 -T omnix-files/linker.ld --oformat binary kernel.o -o kernel.bin
          cat boot.bin kernel.bin > os_combined.bin
          dd if=/dev/zero of=omnix_os.img bs=1024 count=1440
          dd if=os_combined.bin of=omnix_os.img conv=notrunc

      - name: Nahrání hotového OS
        uses: actions/upload-artifact@v4
        with:
          name: omnix-os-image
          path: omnix_os.img
