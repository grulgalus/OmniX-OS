name: Build OmniX OS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Instalace nástrojů pro ISO
        run: sudo apt-get update && sudo apt-get install -y nasm xorriso

      - name: Kompilace OmniX OS
        run: |
          rustup target add i686-unknown-linux-gnu

          nasm -f bin omnix-files/bootloader/asm/boot.asm -o boot.bin
          rustc --target i686-unknown-linux-gnu -C panic=abort -C opt-level=2 -C relocation-model=static -C no-redzone=y -C code-model=kernel --emit obj omnix-files/kernel/rust/main.rs -o kernel.o
          ld -m elf_i386 -T omnix-files/linker.ld kernel.o -o kernel.bin

          cat boot.bin kernel.bin > omnix_core.bin

          mkdir -p isodir
          cp omnix_core.bin isodir/
          xorriso -as mkisofs -R -J -b omnix_core.bin -no-emul-boot -boot-load-size 64 -o omnix_os.iso isodir

      - name: Upload OmniX OS ISO
        uses: actions/upload-artifact@v4
        with:
          name: omnix-os-iso
          path: omnix_os.iso
